[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary info for failures and errors
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

markers =
    unit:        Pure unit tests, no I/O, no model loading
    integration: Tests that require real models or external services
    slow:        Tests that take > 5 seconds

# Minimum test coverage threshold (enforce via CI)
# Run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80
