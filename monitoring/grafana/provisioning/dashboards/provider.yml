# grafana/provisioning/dashboards/provider.yml
#
# Tells Grafana to watch /var/lib/grafana/dashboards for JSON files
# and auto-provision them. Drop any new dashboard JSON in that folder
# and it will appear in Grafana within 30 seconds.

apiVersion: 1
providers:
  - name: HR Pipeline
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
